upstream webapi {
    server webapi:8080;
}

upstream blazor {
    server blazor:80;
}

server {
    listen 80;
    server_name staging.naeraces.co.uk;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebAPI data endpoints
    location /api/ {
        proxy_pass http://webapi;
    }

    # OpenIddict authorization endpoints
    location /connect/ {
        proxy_pass http://webapi;
    }

    # OpenIddict discovery document
    location /.well-known/ {
        proxy_pass http://webapi;
    }

    # Identity / account pages (login, register)
    location /Identity/ {
        proxy_pass http://webapi;
    }

    # OpenAPI / Swagger UI
    location /openapi/ {
        proxy_pass http://webapi;
    }

    location /swagger/ {
        proxy_pass http://webapi;
    }

    # Blazor WebAssembly SPA (catch-all)
    location / {
        proxy_pass http://blazor;
    }
}
