upstream webapi {
    server webapi:8080;
}

upstream blazor {
    server blazor:80;
}

# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name staging.naeraces.co.uk;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name staging.naeraces.co.uk;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    add_header Strict-Transport-Security "max-age=63072000" always;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebAPI data endpoints
    location /api/ {
        proxy_pass http://webapi;
    }

    # OpenIddict authorization endpoints
    location /connect/ {
        proxy_pass http://webapi;
    }

    # OpenIddict discovery document
    location /.well-known/ {
        proxy_pass http://webapi;
    }

    # Identity / account pages (login, register)
    location /Identity/ {
        proxy_pass http://webapi;
    }

    # OpenAPI / Swagger UI
    location /openapi/ {
        proxy_pass http://webapi;
    }

    location /swagger/ {
        proxy_pass http://webapi;
    }

    # Blazor WebAssembly SPA (catch-all)
    location / {
        proxy_pass http://blazor;
    }
}
