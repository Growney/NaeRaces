services:

  # ── Reverse proxy ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:mainline-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - webapi
      - blazor

  # ── Blazor WebAssembly front-end ───────────────────────────────────────────
  blazor:
    build:
      context: .
      dockerfile: NaeRaces.BlazorWebApp/Dockerfile
    expose:
      - "80"
    environment:
      # Must be the public URL the browser uses to reach the API.
      # When routed through the nginx proxy above, the base origin is enough
      # because all API paths already carry the /api/ prefix.
      WEB_API_ADDRESS: "https://staging.naeraces.co.uk"

  # ── ASP.NET Core Web API ───────────────────────────────────────────────────
  webapi:
    build:
      context: .
      dockerfile: NaeRaces.WebAPI/Dockerfile
    expose:
      - "8080"
    environment:
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__NaeRacesQuery: "Server=sqlserver;Database=NaeRacesQuery;TrustServerCertificate=True;User Id=sa;Password=${SQL_SA_PASSWORD};"
      ConnectionStrings__OpenIddict: "Server=sqlserver;Database=NaeRacesOpenIddict;TrustServerCertificate=True;User Id=sa;Password=${SQL_SA_PASSWORD};"
      ConnectionStrings__KurrentDb: "kurrentdb://admin:${KURRENTDB_PASSWORD}@kurrentdb:2113?tls=false"
      # Override OpenIddict redirect URIs so they match the nginx proxy origin.
      OpenIddictClients__0__RedirectUris__0: "https://staging.naeraces.co.uk/authentication/login-callback"
      OpenIddictClients__0__PostLogoutRedirectUris__0: "https://staging.naeraces.co.uk/authentication/logout-callback"
    depends_on:
      sqlserver:
        condition: service_healthy
      kurrentdb:
        condition: service_started

  # ── SQL Server ─────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_SA_PASSWORD}"
      MSSQL_PID: "Developer"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' -C"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── KurrentDB (EventStoreDB) ───────────────────────────────────────────────
  kurrentdb:
    image: docker.kurrent.io/kurrent-latest/kurrentdb:latest
    command: --insecure --run-projections=All --enable-atom-pub-over-http
    ports:
      - "2113:2113"
    volumes:
      - kurrentdb-data:/var/lib/kurrentdb

volumes:
  sqlserver-data:
  kurrentdb-data:
