events { }

http {
    include       mime.types;
    default_type  application/octet-stream;

    types {
        application/wasm wasm;
    }

    server {
        listen      80;
        server_name _;

        root /app/wwwroot;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html =404;
        }

        # Enable compression
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/wasm application/octet-stream;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|wasm|dat|dll|blat|bin)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
