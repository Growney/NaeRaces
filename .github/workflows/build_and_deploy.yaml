name: Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  image_name_blazor: growneytron/naeracesblazor
  image_name_webapi: growneytron/naeraceswebapi

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build
    outputs:
      IMAGE_TAG: ${{ steps.outputs.outputs.IMAGE_TAG }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v6
        with:
          path: app_repo
          submodules: true

      - name: Calculate image tag
        working-directory: app_repo
        run: |
          short_commit=$(git rev-parse --short "$GITHUB_SHA")
          echo "short_commit: ${short_commit}"

          image_version="${{ github.run_number }}-${short_commit}"
          echo "image_version: ${image_version}"

          echo "IMAGE_TAG=${image_version}" >> $GITHUB_ENV
          echo "IMAGE_REF_BLAZOR=${{ env.image_name_blazor }}:${image_version}" >> $GITHUB_ENV
          echo "IMAGE_REF_WEBAPI=${{ env.image_name_webapi }}:${image_version}" >> $GITHUB_ENV

      - name: Login to dockerhub
        uses: docker/login-action@v3
        with:
         username: ${{ secrets.DOCKERHUB_USERNAME }}
         password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push to dockerhub - blazor
        uses: docker/build-push-action@v5
        with:
          # cache-from: type=gha
          # cache-to: type=gha,mode=max
          context: app_repo
          file: app_repo/NaeRaces.BlazorWebApp/Dockerfile
          push: true
          tags: ${{ env.IMAGE_REF_BLAZOR }}

      - name: Build and push to dockerhub - webapi
        uses: docker/build-push-action@v5
        with:
          # cache-from: type=gha
          # cache-to: type=gha,mode=max
          context: app_repo
          file: app_repo/NaeRaces.WebAPI/Dockerfile
          push: true
          tags: ${{ env.IMAGE_REF_WEBAPI }}

      - name: Output variables
        id: outputs
        run: |
          echo "IMAGE_TAG=${{ env.IMAGE_TAG }}" >> $GITHUB_OUTPUT

  deploy_to_test:
    name: Deploy to Test
    needs: build
    env:
      compose_path: sites/staging/docker-compose.yml
    environment:
      name: staging
      url: https://staging.naeraces.co.uk
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site-root
        uses: actions/checkout@v6
        with:
          path: gitops_repo
          repository: Growney/naeraces.co.uk
          token: ${{ secrets.SITE_ROOT_PAT }}

      - name: Set up variables
        run: |
          echo "IMAGE_REF_BLAZOR=${{ env.image_name_blazor }}:${{ needs.build.outputs.IMAGE_TAG }}" >> $GITHUB_ENV
          echo "IMAGE_REF_WEBAPI=${{ env.image_name_webapi }}:${{ needs.build.outputs.IMAGE_TAG }}" >> $GITHUB_ENV

      - name: Set image refs
        run: |
          yq -i '(.services.blazor.image) = "${{ env.IMAGE_REF_BLAZOR }}"' gitops_repo/${{ env.compose_path }}
          yq -i '(.services.webapi.image) = "${{ env.IMAGE_REF_WEBAPI }}"' gitops_repo/${{ env.compose_path }}

      - name: Commit changes
        run: |
          cd gitops_repo
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto commit from NaeRace's Deploy to Test, run: ${{ github.run_number }}"
          
          # TODO - add shared workflow for retrying this
          echo "Doing a pull --rebase"
          git pull --rebase

          echo "Pushing"
          git push

